<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>페이지를 찾을 수 없습니다 - 김주인내과</title>
	<style>
		body {
			font-family: 'Pretendard', 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
			background: #FAFCFA;
			color: #2D3748;
			display: flex;
			justify-content: center;
			align-items: center;
			min-height: 100vh;
			margin: 0;
			text-align: center;
		}
		.error-box {
			max-width: 480px;
			padding: 40px 30px;
			background: #fff;
			border-radius: 12px;
			box-shadow: 0 2px 12px rgba(0,0,0,0.08);
		}
		h1 {
			font-size: 48px;
			color: #83a731;
			margin: 0 0 12px;
		}
		p {
			font-size: 16px;
			line-height: 1.6;
			margin: 8px 0;
		}
		a.home-btn {
			display: inline-block;
			margin-top: 24px;
			padding: 12px 32px;
			background: #83a731;
			color: #fff;
			text-decoration: none;
			border-radius: 6px;
			font-size: 15px;
		}
		a.home-btn:hover {
			background: #6B8A28;
		}
		.tel {
			margin-top: 20px;
			font-size: 14px;
			color: #666;
		}
	</style>
<style>
@font-face { font-family: 'JejuMyeongjo'; src: url('/assets/fonts/JejuMyeongjo.woff2') format('woff2'),
       url('/assets/fonts/JejuMyeongjo.otf') format('opentype'); font-display: swap; }
* { font-family: 'JejuMyeongjo', 'Hiragino Sans', 'Noto Sans CJK JP', 'Noto Sans SC', 'Microsoft YaHei', serif !important; }
.head_bar_2 .head_cont .nav .gnb .dropdown a.dropbtn,
.head_bar_2 .head_cont .nav .gnb .dropdown a.dropbtn span { color: #ffffff !important; font-weight: 700 !important; }
.head_bar_2 .head_cont .nav .gnb .dropdown + .dropdown::before {
  content: '|'; color: rgba(255,255,255,0.4); margin-right: 0; font-weight: 300; font-size: 14px;
  position: relative; top: -1px;
}
</style>
	<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
</head>
<body>
	<div class="error-box">
		<h1>404</h1>
		<p>요청하신 페이지를 찾을 수 없습니다.</p>
		<p>주소를 다시 확인해 주세요.</p>
		<a class="home-btn" href="/">홈으로 돌아가기</a>
		<p class="tel">문의전화: 051-802-7550</p>
	</div>
</body>
</html>
